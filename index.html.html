<div id="videoDetails" class="hidden">
    <img id="thumb" src="" alt="Thumbnail" style="width: 100%; border-radius: 10px;">
    <h3 id="videoTitle" style="margin: 15px 0;"></h3>
    
    <div class="quality-selector">
        <label for="res">Select Quality: </label>
        <select id="res" style="padding: 8px; border-radius: 5px; margin-bottom: 15px;">
            <option value="360p">360p (Low)</option>
            <option value="720p" selected>720p (HD)</option>
            <option value="1080p">1080p (Full HD)*</option>
        </select>
    </div>

    <div class="options">
        <button onclick="startDownload('mp4')" class="dl-btn" style="background: #28a745;">Download MP4</button>
        <button onclick="startDownload('mp3')" class="dl-btn" style="background: #007bff;">Download MP3</button>
    </div>
</div>
